<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AdotePet Login</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>🐾 AdotePet</h1>

<p>
Faça login para continuar
</p>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="senha"
placeholder="Senha">

<button onclick="login()">

Entrar

</button>

<a href="cadastro-user.html">

Criar conta

</a>

</div>

</div>

<script>

function login(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

if(
email === "admin@gmail.com"
&&
senha === "123"
){

localStorage.setItem(
"logado",
"true"
);

window.location.href =
"./home.html";

}

else{

alert("Login inválido");

}

}

</script>

</body>
</html>
