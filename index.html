<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>AdotePet</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<header>

    <nav>

        <h2>🐾 AdotePet</h2>

        <div class="menu">

            <a href="#">Início</a>
            <a href="#">Animais</a>
            <a href="#">Contato</a>

        </div>

    </nav>

    <div class="hero">

        <div class="hero-text">

            <h1>
                Adote um amigo
                para a vida ❤️
            </h1>

            <p>
                Encontre cães e gatos esperando
                por um lar cheio de amor.
            </p>

            <button>
                Ver Animais
            </button>

        </div>

        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=800">

    </div>

</header>

<section class="pets">

    <h2>
        🐶 Animais Disponíveis
    </h2>

    <div class="cards">

        <div class="card">

            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=800">

            <h3>Thor</h3>

            <p>Labrador • 2 anos</p>

            <button>
                ❤️ Adotar
            </button>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?q=80&w=800">

            <h3>Luna</h3>

            <p>Persa • 1 ano</p>

            <button>
                ❤️ Adotar
            </button>

        </div>

        <div class="card">

            <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?q=80&w=800">

            <h3>Max</h3>

            <p>Golden Retriever • 3 anos</p>

            <button>
                ❤️ Adotar
            </button>

        </div>

    </div>

</section>

</body>
</html>
