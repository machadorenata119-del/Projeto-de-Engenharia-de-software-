<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AdotePet</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#4facfe;

}

.login{

background:white;
width:350px;
padding:40px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);

}

.login h1{

text-align:center;
margin-bottom:10px;
color:#0d6efd;

}

.login p{

text-align:center;
margin-bottom:30px;
color:#666;

}

.input{

margin-bottom:20px;

}

.input label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

.input input{

width:100%;
padding:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#0d6efd;
color:white;
font-size:18px;
cursor:pointer;

}

.links{

margin-top:20px;
display:flex;
justify-content:space-between;

}

.links a{

text-decoration:none;
font-size:14px;
color:#0d6efd;

}

</style>

</head>

<body>

<div class="login">

<h1>🐾 AdotePet</h1>

<p>
Faça login para entrar
</p>

<div class="input">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Digite seu email">

</divm
