<div class="input-group">

<i class="fa fa-lock"></i>

type="password"
id="senha"

</div>

<button onclick="login()">
Entrar
</button>

<div class="links">

<a href="#"
onclick="abrirCadastro()">

</a>

onclick="esqueciSenha()">

</a>

</div>

</div>

</div>
