<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AdotePet Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00c6fb);

}

/* CARD LOGIN */

.login-box{

width:380px;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);

}

/* TÍTULO */

.logo{

text-align:center;
margin-bottom:30px;

}

.logo h1{

color:#0d6efd;
font-size:42px;
margin-bottom:10px;

}

.logo p{

color:#666;

}

/* INPUTS */

.input-box{

margin-bottom:20px;

}

.input-box label{

display:block;
margin-bottom:8px;
font-weight:bold;
color:#333;

}

.input{

display:flex;
align-items:center;
border:1px solid #ddd;
border-radius:12px;
padding:14px;

}

.input i{

margin-right:10px;
color:#0d6efd;

}

.input input{

border:none;
outline:none;
width:100%;
font-size:16px;

}

/* BOTÃO */

button{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#0d6efd;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#0b5ed7;

}

/* LINKS */

.links{

margin-top:20px;
display:flex;
justify-content:space-between;

}

.links a{

text-decoration:none;
font-size:14px;
color:#0d6efd;

}

/* RESPONSIVO */

@media(max-width:500px){

.login-box{

width:90%;
padding:30px;

}

.logo h1{

font-size:35px;

}

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

<h1>🐾 AdotePet</h1>

<p>
Faça login para continuar
</p>

</div>

<div class="input-box">

<label>Email</label>

<div class="input">

<i class="fa fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Digite seu email">

</div>

</div>

<div class="input-box">

<label>Senha</label>

<div class="input">

<i class="fa fa-lock"></i>

<input
type="password"
id="senha"
placeholder="Digite sua senha">

</div>

</div>

<button onclick="login()">

Entrar

</button>

<div class="links">

<a href="cadastro-user.html">

Criar conta

</a>

<a href="#"
onclick="esqueciSenha()">

Esqueci senha

</a>

</div>

</div>

<script>

// USUÁRIOS

let usuarios =
JSON.parse(
localStorage.getItem("usuarios")
)
||
[
{
email:"admin@gmail.com",
senha:"123"
}
];

// LOGIN

function login(){

const email =
document.getElementById("email").value;

const senha =
document.getElementById("senha").value;

const usuario =
usuarios.find(u =>
u.email === email
&&
u.senha === senha
);

if(usuario){

localStorage.setItem(
"logado",
"true"
);

window.location.href =
"home.html";

}

else{

alert(
"❌ Email ou senha inválidos"
);

}

}

// RECUPERAR SENHA

function esqueciSenha(){

const email =
prompt(
"Digite seu email:"
);

const usuario =
usuarios.find(u =>
u.email === email
);

if(usuario){

alert(
"🔑 Sua senha é: "
+
usuario.senha
);

}

else{

alert(
"❌ Usuário não encontrado"
);

}

}

</script>

</body>
</html>
